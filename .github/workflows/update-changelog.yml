name: "Update Changelog"

on:
  release:
    types: [released]
  workflow_run:
    workflows: ["Tests and release"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve latest release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_json=$(gh api "repos/${{ github.repository }}/releases/latest")
          version=$(jq -r '.name // .tag_name' <<< "$release_json")
          delimiter="release_notes_$(date +%s)"

          {
            echo "version=$version"
            echo "notes<<$delimiter"
            jq -r '.body // ""' <<< "$release_json"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ steps.release.outputs.version }}
          release-notes: ${{ steps.release.outputs.notes }}

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: Update CHANGELOG
          file_pattern: CHANGELOG.md
