name: Tests and release

on:
  push:
    paths:
      - "src/**"
      - "config/**"
      - "resources/**"
      - "tests/**"
      - "composer.json"
      - "phpunit.xml.dist"
      - "phpstan.neon.dist"
      - "pint.json"
      - ".github/workflows/run-tests.yml"
  pull_request:
    paths:
      - "src/**"
      - "config/**"
      - "resources/**"
      - "tests/**"
      - "composer.json"
      - "phpunit.xml.dist"
      - "phpstan.neon.dist"
      - "pint.json"
      - ".github/workflows/run-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / ${{ matrix.os }} / ${{ matrix.stability }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            php: "8.3"
            laravel: "12.*"
            testbench: "10.*"
            stability: prefer-lowest
          - os: ubuntu-latest
            php: "8.4"
            laravel: "12.*"
            testbench: "10.*"
            stability: prefer-stable
          - os: windows-latest
            php: "8.4"
            laravel: "12.*"
            testbench: "10.*"
            stability: prefer-stable
          - os: ubuntu-latest
            php: "8.4"
            laravel: "13.*"
            testbench: "11.*"
            stability: prefer-lowest
          - os: ubuntu-latest
            php: "8.5"
            laravel: "13.*"
            testbench: "11.*"
            stability: prefer-stable
          - os: windows-latest
            php: "8.5"
            laravel: "13.*"
            testbench: "11.*"
            stability: prefer-stable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, gd, fileinfo
          coverage: none

      - name: Install matrix dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest --ci

  quality:
    name: Static analysis and style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Run static analysis
        run: composer analyse

      - name: Check code style
        run: vendor/bin/pint --test

  auto-release:
    name: Create patch release
    needs: [test, quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        shell: bash
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$latest" >> "$GITHUB_OUTPUT"

      - name: Calculate next patch version
        id: next_version
        shell: bash
        run: |
          version="${{ steps.latest_tag.outputs.tag }}"
          version="${version#v}"
          IFS='.' read -r major minor patch <<< "$version"
          echo "version=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next_version.outputs.version }}"
          git push origin "${{ steps.next_version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.version }}
          generate_release_notes: true
