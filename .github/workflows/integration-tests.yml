name: Starterkit integration

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "resources/registry/**"
      - "resources/stubs/**"
      - "composer.json"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "resources/registry/**"
      - "resources/stubs/**"
      - "composer.json"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold:
    name: ${{ matrix.setup }} setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        setup: [app, filament, multilanguage]

    steps:
      - name: Checkout Craft Laravel
        uses: actions/checkout@v4
        with:
          path: craft-laravel

      - name: Checkout Craft React starterkit
        uses: actions/checkout@v4
        with:
          repository: hardimpactdev/craft-starterkit-react
          token: ${{ secrets.GH_PAT }}
          path: starterkit

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, gd, fileinfo
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: starterkit/package-lock.json

      - name: Install the package under test
        working-directory: starterkit
        run: |
          composer config repositories.craft-laravel path ../craft-laravel
          composer require hardimpactdev/craft-laravel:@dev --with-all-dependencies --prefer-dist --no-interaction

      - name: Install frontend dependencies
        working-directory: starterkit
        run: npm ci

      - name: Prepare application
        working-directory: starterkit
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run setup twice
        working-directory: starterkit
        run: |
          php artisan craft:setup ${{ matrix.setup }}
          php artisan craft:setup ${{ matrix.setup }}

      - name: Verify generated files
        working-directory: starterkit
        shell: bash
        run: |
          case "${{ matrix.setup }}" in
            app)
              test -f app/Providers/FortifyServiceProvider.php
              test -f config/passkeys.php
              test -f resources/js/pages/auth/login.tsx
              test -f resources/js/pages/Dashboard.tsx
              test -f resources/js/pages/settings/security.tsx
              ;;
            filament)
              test -f app/Providers/Filament/AdminPanelProvider.php
              test -f app/Filament/Pages/Auth/EditProfile.php
              test -f app/Http/Middleware/AuthenticateFilament.php
              test -f resources/views/filament/user-security/passkeys.blade.php
              ;;
            multilanguage)
              test -f lang/en.json
              test -f lang/nl.json
              test -f resources/js/pages/TranslationExample.tsx
              grep -q "i18n: true" vite.config.ts
              ;;
          esac

      - name: Build frontend
        working-directory: starterkit
        run: npm run build

      - name: Run migrations and tests
        working-directory: starterkit
        run: |
          php artisan migrate:fresh --force
          composer test
